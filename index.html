<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai For My Sweetheart ❤️</title>
    <style>
        :root { --primary: #ff7675; --secondary: #fab1a0; --bg: #fff5f5; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .menu-box { margin-bottom: 20px; width: 100%; max-width: 450px; text-align: center; }
        select { padding: 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 1rem; width: 100%; outline: none; background: white; }

        .card-container { perspective: 1000px; width: 340px; height: 480px; cursor: pointer; margin-bottom: 20px; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(255,118,117,0.2); border: 5px solid white; }
        
        .card-front { background: white; color: #2d3436; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); text-align: center; }

        .thai-word { font-size: 3.5rem; font-weight: bold; margin: 0; color: var(--primary); }
        .zh-read { font-size: 1.1rem; color: #636e72; margin-top: 10px; }
        .meaning-zh { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; }
        
        .example-box { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; width: 100%; font-size: 1rem; text-align: left; line-height: 1.5; }
        .example-title { font-weight: bold; color: #ffdada; font-size: 0.9rem; margin-bottom: 5px; }

        .audio-btn { background: var(--secondary); border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; margin-bottom: 20px; color: white; transition: 0.2s; }
        .audio-btn:hover { transform: scale(1.1); }

        .controls { display: flex; gap: 10px; width: 340px; }
        .controls button { flex: 1; padding: 15px; border: none; border-radius: 15px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #eee; font-size: 1.1rem; }
        .shuffle-btn { background: #55efc4 !important; color: white !important; box-shadow: 0 4px 0 #00b894 !important; }

        .info { margin-top: 15px; color: #b2bec3; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="menu-box">
        <h2 style="color: var(--primary); margin: 0 0 15px 0;">🇹🇭 เรียนไทยเพื่อเธอ ❤️</h2>
        <select id="categorySelect" onchange="filterCategory()">
            <option value="all">ทั้งหมด (All Categories)</option>
            <option value="ความรัก">❤️ หมวดความรัก</option>
            <option value="ทั่วไป">😊 หมวดทั่วไป</option>
            <option value="อาหาร">🍲 หมวดอาหาร</option>
        </select>
    </div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <button class="audio-btn" onclick="speak(event)">🔊</button>
                <h1 class="thai-word" id="th-word">โหลด...</h1>
                <p class="zh-read" id="zh-read">อ่าน: ...</p>
                <p style="font-size: 0.8rem; color: #ccc; margin-top: 30px;">(แตะเพื่อดูคำแปลและประโยค)</p>
            </div>
            <div class="card-face card-back">
                <div class="meaning-zh" id="zh-mean">...</div>
                <div class="example-box">
                    <div class="example-title">💡 ประโยคตัวอย่าง:</div>
                    <div id="ex-th" style="font-weight:bold; margin-bottom:5px;"></div>
                    <div id="ex-zh" style="font-size:0.9rem; opacity:0.9;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">❮</button>
        <button class="shuffle-btn" onclick="shuffleCards()">🔀 สุ่ม</button>
        <button onclick="nextCard()">❯</button>
    </div>

    <p class="info" id="progress">ข้อที่ 1 / 1</p>

        ];

        let currentVocab = [...allVocab];
        let index = 0;

        function updateCard() {
            const item = currentVocab[index];
            document.getElementById('card').classList.remove('is-flipped');
            setTimeout(() => {
                document.getElementById('th-word').innerText = item.th;
                document.getElementById('zh-read').innerText = "อ่านจีน: " + item.zr;
                document.getElementById('zh-mean').innerText = item.zm;
                document.getElementById('ex-th').innerText = item.ex_th;
                document.getElementById('ex-zh').innerText = "จีน: " + item.ex_zh;
                document.getElementById('progress').innerText = `หมวด: ${item.cat} | ${index + 1} / ${currentVocab.length}`;
            }, 100);
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('is-flipped');
        }

        function nextCard() {
            index = (index + 1) % currentVocab.length;
            updateCard();
        }

        function prevCard() {
            index = (index - 1 + currentVocab.length) % currentVocab.length;
            updateCard();
        }

        function shuffleCards() {
            currentVocab.sort(() => Math.random() - 0.5);
            index = 0;
            updateCard();
        }

        function filterCategory() {
            const cat = document.getElementById('categorySelect').value;
            if (cat === 'all') {
                currentVocab = [...allVocab];
            } else {
                currentVocab = allVocab.filter(item => item.cat === cat);
            }
            index = 0;
            updateCard();
        }

        function speak(event) {
            event.stopPropagation();
            const text = currentVocab[index].th;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'th-TH';
            msg.rate = 0.7;
            window.speechSynthesis.speak(msg);
        }

        updateCard();
    </script>
